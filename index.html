<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法学256班级空间</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>法学256班级空间</h1>
        <nav>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="gallery.html">画廊</a></li>
                <li><a href="profile.html">班级名片</a></li>
                <li><a href="library.html">班级图书馆</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="memorial-dashboard">
            <!-- 左侧：高级照片视窗 -->
            <div class="carousel-container">
                <div class="hero-carousel">
                    <img src="assets/images/banhui/cover.png" alt="班会记录" class="carousel-image">
                    <button class="carousel-arrow carousel-prev" aria-label="上一张"><</button>
                    <button class="carousel-arrow carousel-next" aria-label="下一张">></button>
                    <a href="gallery.html#banhui" class="carousel-route" id="carouselRoute">班会记录</a>
                </div>
            </div>
            
            <!-- 右侧：极简动态时间轴 -->
            <div class="timeline-container">
                <div class="timeline-section">
                    <h3 class="timeline-title">近期历程 / TIMELINE</h3>
                    <ul class="timeline-list" id="timeline-container"></ul>
                </div>
            </div>
        </div>
    </main>
    <script src="timeline-data.js"></script>
    <footer>
        <p>&copy; 2025 法学256班级空间. 保留所有权利.</p>
    </footer>
    <script src="app.js"></script>
    <script>
        // 渲染时间轴
        function renderTimeline() {
            const container = document.getElementById('timeline-container');
            window.timelineData.forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = `<strong>${item.date}</strong> ${item.event}`;
                container.appendChild(li);
            });
        }

        // 页面加载完成后渲染时间轴
        document.addEventListener('DOMContentLoaded', renderTimeline);
        
        // 照片视窗数据
        const galleryData = [
            {
                imgSrc: 'assets/images/banhui/cover.png',
                sectionName: '班会记录',
                link: 'gallery.html#banhui'
            },
            {
                imgSrc: 'assets/images/wenti/cover.png',
                sectionName: '文体活动',
                link: 'gallery.html#wenti'
            },
            {
                imgSrc: 'assets/images/hezhao/Gemini_Generated_Image_kva1y1kva1y1kva1.png',
                sectionName: '班级合照',
                link: 'gallery.html#hezhao'
            }
        ];

        // 获取DOM元素
        const carouselImage = document.querySelector('.carousel-image');
        const carouselRoute = document.getElementById('carouselRoute');
        const prevButton = document.querySelector('.carousel-prev');
        const nextButton = document.querySelector('.carousel-next');

        // 当前索引
        let currentIndex = 0;

        // 更新视窗内容
        function updateCarousel() {
            const item = galleryData[currentIndex];
            carouselImage.src = item.imgSrc;
            carouselImage.alt = item.sectionName;
            carouselRoute.textContent = item.sectionName;
            carouselRoute.href = item.link;
        }

        // 切换到上一张
        function goToPrev() {
            currentIndex = (currentIndex - 1 + galleryData.length) % galleryData.length;
            carouselImage.style.opacity = '0';
            setTimeout(() => {
                updateCarousel();
                carouselImage.style.opacity = '1';
            }, 100);
        }

        // 切换到下一张
        function goToNext() {
            currentIndex = (currentIndex + 1) % galleryData.length;
            carouselImage.style.opacity = '0';
            setTimeout(() => {
                updateCarousel();
                carouselImage.style.opacity = '1';
            }, 100);
        }

        // 初始化
        updateCarousel();

        // 事件监听器
        prevButton.addEventListener('click', goToPrev);
        nextButton.addEventListener('click', goToNext);

        // 键盘支持（左右箭头键）
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                goToPrev();
            } else if (e.key === 'ArrowRight') {
                goToNext();
            }
        });
    </script>
</body>
</html>
