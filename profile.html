<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级名片 - 法学256班级空间</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>法学256班级空间</h1>
        <nav>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="gallery.html">画廊</a></li>
                <li><a href="profile.html">班级名片</a></li>
                <li><a href="library.html">班级图书馆</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="honors">
            <h2>班级荣誉</h2>
            <div class="honors-grid" id="honors-container">
                <!-- 荣誉卡片将通过 JavaScript 动态生成 -->
            </div>
        </section>
        <section class="committee">
            <h2>班委团队</h2>
            <div class="committee-grid">
                <div class="committee-card">
                    <div class="avatar">🌟</div>
                    <h3>班长</h3>
                </div>
                <div class="committee-card">
                    <div class="avatar">🚩</div>
                    <h3>团支书</h3>
                </div>
                <div class="committee-card">
                    <div class="avatar">📚</div>
                    <h3>学习委员</h3>
                </div>
                <div class="committee-card">
                    <div class="avatar">☕</div>
                    <h3>生活委员</h3>
                </div>
                <div class="committee-card">
                    <div class="avatar">🎨</div>
                    <h3>文体委员</h3>
                </div>
                <div class="committee-card">
                    <div class="avatar">🌻</div>
                    <h3>心理委员</h3>
                </div>
                <div class="committee-card">
                    <div class="avatar">📋</div>
                    <h3>组织委员</h3>
                </div>
                <div class="committee-card">
                    <div class="avatar">📢</div>
                    <h3>宣传委员</h3>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2025 法学256班级空间. 保留所有权利.</p>
    </footer>
    <script src="honors-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
