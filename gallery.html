<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生活剪影 - 法学256班级空间</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>法学256班级空间</h1>
        <nav>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="gallery.html">画廊</a></li>
                <li><a href="profile.html">班级名片</a></li>
                <li><a href="library.html">班级图书馆</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="gallery-grid" id="gallery-grid">
            <!-- 动态生成的相册卡片将在这里显示 -->
        </div>
    </main>
    <footer>
        <p>&copy; 2025 法学256班级空间. 保留所有权利.</p>
    </footer>
    
    <!-- Lightbox 浮窗 -->
    <div id="lightbox" class="lightbox">
        <div class="lightbox-background"></div>
        <div class="lightbox-content">
            <button class="lightbox-close" aria-label="关闭">&times;</button>
            <button class="lightbox-arrow lightbox-prev" aria-label="上一张">‹</button>
            <button class="lightbox-arrow lightbox-next" aria-label="下一张">›</button>
            <div class="lightbox-image-container">
                <img class="lightbox-image" src="" alt="">
            </div>
            <div class="lightbox-info">
                <span class="lightbox-counter"></span>
            </div>
        </div>
    </div>
    
    <script src="gallery-data.js"></script>
    <script>
        // 文件夹名称映射字典
        const folderNames = {
            "banhui": "班会记录",
            "wenti": "文体活动",
            "hezhao": "班级合照"
        };
        
        // 动态渲染画廊卡片
        function renderGallery() {
            const galleryGrid = document.getElementById('gallery-grid');
            
            // 清空现有内容（如果有的话）
            galleryGrid.innerHTML = '';
            
            // 遍历 albumData 中的所有相册
            for (const folderKey in window.albumData) {
                if (!window.albumData.hasOwnProperty(folderKey)) continue;
                
                const albumImages = window.albumData[folderKey];
                if (!albumImages || albumImages.length === 0) continue;
                
                // 获取中文标题，如果找不到则使用大写的文件夹名
                const chineseTitle = folderNames[folderKey] || folderKey.toUpperCase();
                
                // 获取封面图（优先使用 cover.png，否则使用第一张图片）
                let coverImage = albumImages.find(img => img.includes('cover.png'));
                if (!coverImage) {
                    coverImage = albumImages[0];
                }
                
                // 创建相册卡片元素
                const albumCard = document.createElement('a');
                albumCard.href = `#${folderKey}`;
                albumCard.className = 'album-card';
                albumCard.setAttribute('data-album', folderKey);
                
                // 创建图片包装器
                const imgWrapper = document.createElement('div');
                imgWrapper.className = 'album-img-wrapper';
                
                const img = document.createElement('img');
                img.src = coverImage;
                img.alt = chineseTitle;
                imgWrapper.appendChild(img);
                
                // 创建相册信息
                const albumInfo = document.createElement('div');
                albumInfo.className = 'album-info';
                
                const title = document.createElement('h3');
                title.textContent = chineseTitle;
                
                const meta = document.createElement('div');
                meta.className = 'album-meta';
                // 使用当前日期作为默认日期，因为原始数据中没有日期信息
                const today = new Date();
                const formattedDate = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
                meta.textContent = `${formattedDate} · 共 ${albumImages.length} 张`;
                
                albumInfo.appendChild(title);
                albumInfo.appendChild(meta);
                
                // 组装卡片
                albumCard.appendChild(imgWrapper);
                albumCard.appendChild(albumInfo);
                
                // 添加到画廊网格
                galleryGrid.appendChild(albumCard);
            }
        }
        
        // 自动更新计数
        function updateAlbumCounts() {
            const albumCards = document.querySelectorAll('.album-card');
            
            albumCards.forEach(card => {
                const albumName = card.getAttribute('data-album');
                const albumImages = window.albumData[albumName];
                
                if (albumImages) {
                    const count = albumImages.length;
                    const metaElement = card.querySelector('.album-meta');
                    
                    // 提取日期部分，保留原有日期格式
                    const metaText = metaElement.textContent;
                    const dateMatch = metaText.match(/^(\d{4}-\d{2}-\d{2})/);
                    
                    if (dateMatch) {
                        const date = dateMatch[1];
                        metaElement.textContent = `${date} · 共 ${count} 张`;
                    }
                }
            });
        }
        
        // Lightbox 功能
        let currentAlbum = null;
        let currentIndex = 0;
        
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.querySelector('.lightbox-image');
        const lightboxCounter = document.querySelector('.lightbox-counter');
        const lightboxClose = document.querySelector('.lightbox-close');
        const lightboxPrev = document.querySelector('.lightbox-prev');
        const lightboxNext = document.querySelector('.lightbox-next');
        const lightboxBackground = document.querySelector('.lightbox-background');
        
        // 打开 Lightbox
        function openLightbox(albumName) {
            currentAlbum = albumName;
            currentIndex = 0;
            updateLightboxImage();
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        // 关闭 Lightbox
        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }
        
        // 更新 Lightbox 图片
        function updateLightboxImage() {
            const images = window.albumData[currentAlbum];
            if (images && images.length > 0) {
                lightboxImage.src = images[currentIndex];
                lightboxImage.alt = `相册 ${currentAlbum} 的第 ${currentIndex + 1} 张图片`;
                lightboxCounter.textContent = `${currentIndex + 1} / ${images.length}`;
            }
        }
        
        // 切换到上一张
        function goToPrev() {
            const images = window.albumData[currentAlbum];
            if (images && images.length > 0) {
                currentIndex = (currentIndex - 1 + images.length) % images.length;
                updateLightboxImage();
            }
        }
        
        // 切换到下一张
        function goToNext() {
            const images = window.albumData[currentAlbum];
            if (images && images.length > 0) {
                currentIndex = (currentIndex + 1) % images.length;
                updateLightboxImage();
            }
        }
        
        // 事件监听器
        document.addEventListener('DOMContentLoaded', () => {
            // 首先渲染画廊
            renderGallery();
            
            // 然后更新计数（虽然 renderGallery 已经设置了正确的计数，但保留此函数以备后用）
            updateAlbumCounts();
            
            // 使用事件委托处理相册卡片点击事件
            document.addEventListener('click', (e) => {
                // 检查点击的元素是否是相册卡片或其子元素
                const albumCard = e.target.closest('.album-card');
                if (albumCard) {
                    e.preventDefault();
                    const albumName = albumCard.getAttribute('data-album');
                    openLightbox(albumName);
                }
            });
            
            // Lightbox 控制事件
            lightboxClose.addEventListener('click', closeLightbox);
            lightboxBackground.addEventListener('click', closeLightbox);
            lightboxPrev.addEventListener('click', goToPrev);
            lightboxNext.addEventListener('click', goToNext);
            
            // 键盘支持
            document.addEventListener('keydown', (e) => {
                if (lightbox.classList.contains('active')) {
                    if (e.key === 'Escape') {
                        closeLightbox();
                    } else if (e.key === 'ArrowLeft') {
                        goToPrev();
                    } else if (e.key === 'ArrowRight') {
                        goToNext();
                    }
                }
            });
        });
    </script>
</body>
</html>
